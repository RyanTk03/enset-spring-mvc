<!DOCTYPE html>
<html lang="en"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="layout"
>
	<head>
		<meta charset="UTF-8">
		<title>Produits</title>
		<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
	</head>
	<body>
		<div class="p-6" layout:fragment="content">
			<div class="p-3" sec:authorize="hasRole('ADMIN')">
				<a class="btn btn-primary" th:href="@{/admin/new-product}">New product</a>
			</div>
			<table class="table">
				<thead>
					<th>ID</th> <th>Name</th> <th>Price</th> <th>Quantity</th> <th>Actions</th>
				</thead>
				<tbody>
					<tr th:each="p:${products}">
						<td th:text="${p.id}"></td>
						<td th:text="${p.name}"></td>
						<td th:text="${p.price}"></td>
						<td th:text="${p.quantity}"></td>
						<td sec:authorize="hasRole('ADMIN')">
							<form th:action="@{/admin/delete(id=${p.id})}" method="post">
								<button type="submit" class="btn btn-danger">DELETE</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
