<!DOCTYPE html>
<html lang="en"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="layout"
>
	<head>
		<meta charset="UTF-8">
		<title>Produits</title>
		<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
	</head>
	<body>
		<div class="p-6" layout:fragment="content">
			<div class="p-3">
				<a class="btn btn-primary" th:href="@{new-product}">New product</a>
			</div>
			<table class="table">
				<thead>
					<th>ID</th> <th>Name</th> <th>Price</th> <th>Quantity</th> <th>Actions</th>
				</thead>
				<tbody>
					<tr th:each="p:${products}">
						<td th:text="${p.id}"></td>
						<td th:text="${p.name}"></td>
						<td th:text="${p.price}"></td>
						<td th:text="${p.quantity}"></td>
						<td th>
							<a class="btn btn-danger" th:href="@{/delete(id=${p.id})}" onClick="return confirm('Etes vous sur de vouloir supprimer ?')">
								Supprimer
							</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
