<!DOCTYPE html>

<html lang="en"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
	<head>
		<meta charset="UTF-8">
		<title>Title</title>
		<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
	</head>

	<body>
		<header class="bg-dark p-3">
			<nav class="d-flex justify-content-between align-items-center">
				<ul>
					<li class="d-inline-block"><a class="text-white" th:href="@{/}">Accueil</a></li>
					<li class="d-inline-block ms-3"><a class="text-white" th:href="@{/index}">Produits</a></li>
				</ul>
				<div class="dropdown">
					<button class="btn btn-outline-light dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
						<i class="bi bi-person-circle me-1"></i> <span sec:authentication="name"></span>
					</button>
					<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
						<li><a class="dropdown-item" href="#">My Profile</a></li>
						<li><hr class="dropdown-divider"></li>
						<li>
							<form th:action="@{/logout}" method="post">
								<button type="submit" class="dropdown-item text-danger">Logout</button>
							</form>
						</li>
					</ul>
				</div>
			</nav>
		</header>
		<div layout:fragment="content">

		</div>

		<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>   
	</body>
</html>
